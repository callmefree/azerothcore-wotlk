name: windows-build
on:
  push:
    branches:
      - 'master'
      - 'phase-1-talent-demo'
  pull_request:
    types:
      - labeled
      - synchronize

concurrency:
  # One concurrency group per workflow + ref.
  #
  # - PRs use `refs/pull/<PR_NUMBER>/merge`, so new commits cancel older
  #   in-progress runs for the same PR.
  # - When a PR is merged, a push to the target branch starts a new group,
  #   canceling any still-running PR CI.
  # - Branch pushes are isolated by ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}
    env:
      BOOST_ROOT: C:\local\boost_1_87_0
    if: |
      (github.repository == 'azerothcore/azerothcore-wotlk' || github.repository_owner == 'callmefree')
      && !github.event.pull_request.draft
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/phase-1-talent-demo' || contains(github.event.pull_request.labels.*.name, 'run-build') || github.event.label.name == 'run-build')
    steps:
      - uses: actions/checkout@v4
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.13
      - name: Configure OS - Install dependencies
        shell: bash
        env:
          CONTINUOUS_INTEGRATION: true
        run: |
          set +e
          # Install cmake (if not already present)
          choco install -y --no-progress cmake.install 2>&1 || true
          # Install Visual Studio workload (pre-installed on windows-2022, this is a fallback)
          choco install -y --no-progress visualstudio2022-workload-nativedesktop 2>&1 || true
          # Install OpenSSL (required for build)
          choco install -y --no-progress openssl 2>&1 || true
          # Install Boost (required for build)
          choco install -y --no-progress boost-msvc-14.3 2>&1 || echo "Boost choco install skipped, will use cmake find"
          # MySQL client libs - not strictly needed for compilation on CI
          echo "Dependencies installed (skipping MySQL - not needed for CI build)"
          set -e
          # Find actual Boost path if installed
          BOOST_PATH=$(find /c/local -maxdepth 2 -name "boost*" -type d 2>/dev/null | head -1)
          if [ -n "$BOOST_PATH" ]; then
            echo "Found Boost at: $BOOST_PATH"
            echo "BOOST_ROOT=$BOOST_PATH" >> $GITHUB_ENV
          fi
          # Install MySQL client libraries (needed at runtime for libmysql.dll)
          choco install -y --no-progress mysql 2>&1 || true
      - name: Build
        shell: bash
        run: |
          export CTOOLS_BUILD=all
          ./acore.sh compiler build
      - name: Collect runtime DLLs
        shell: bash
        run: |
          BINDIR="var/build/obj/bin/Release"
          # Copy ALL OpenSSL DLLs including legacy provider
          OPENSSL_DIR=$(find /c/Program\ Files/OpenSSL* -maxdepth 0 -type d 2>/dev/null | head -1)
          if [ -n "$OPENSSL_DIR" ]; then
            echo "Found OpenSSL at: $OPENSSL_DIR"
            find "$OPENSSL_DIR" -name "*.dll" | while read f; do
              cp -v "$f" "$BINDIR/" || true
            done
          fi
          # Also search Chocolatey OpenSSL
          find /c/ProgramData/chocolatey/lib/openssl -name "*.dll" 2>/dev/null | while read f; do
            cp -v "$f" "$BINDIR/" || true
          done
          # Copy MySQL DLL from Chocolatey install
          find /c/ProgramData/chocolatey /c/Program\ Files/MySQL -name "libmysql.dll" 2>/dev/null | while read f; do
            cp -v "$f" "$BINDIR/" || true
          done
          echo "DLLs in release dir:"
          ls -la "$BINDIR/"*.dll 2>/dev/null || echo "No DLLs found"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-windows
          path: |
            var/build/obj/bin/Release/*.exe
            var/build/obj/bin/Release/*.dll
            env/dist/**
