name: acoremods-build

on:
  push:
    branches: [ 'feature/acoremods' ]
  workflow_dispatch:
    inputs:
      acoremods_branch:
        description: 'acoremods branch to use'
        required: true
        default: 'main'

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    runs-on: windows-latest
    name: windows-acoremods

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/checkout@v4
        with:
          repository: callmefree/acoremods
          ref: ${{ github.event.inputs.acoremods_branch || 'main' }}
          path: modules-src

      - name: Copy modules
        shell: bash
        run: |
          for mod in modules-src/mod-*; do
            name=$(basename "$mod")
            [ -d "$mod" ] || continue
            cp -r "$mod" "modules/$name"
            echo "Copied: $name"
          done
          ls modules/ | grep '^mod-'

      - name: Copy module configs
        shell: bash
        run: |
          for conf in modules-src/mod-*/conf/*.conf.dist; do
            [ -f "$conf" ] || continue
            cp -v "$conf" conf/
          done

      - name: Install dependencies
        shell: bash
        run: |
          choco install --no-progress --skip-checksums -y cmake.install --installargs 'ADD_CMAKE_TO_PATH=System' 2>&1 || true
          choco install --no-progress --skip-checksums -y boost-msvc-14.3 --version=1.87.0 2>&1 || true
          choco install --no-progress --skip-checksums -y openssl 2>&1 || true
          choco install --no-progress --skip-checksums -y mysql --version=8.4.9 2>&1 || true

      - name: Build
        shell: bash
        run: |
          export CTOOLS_BUILD=all
          export CONTINUOUS_INTEGRATION=true
          ./acore.sh compiler build 2>&1 | tee build.log
          EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== TAIL OF BUILD LOG (last 300 lines) ==="
          tail -300 build.log
          echo "=== END ==="
          if [ $EXIT -ne 0 ]; then
            # Show errors
            echo ""
            echo "=== EXTRACTED ERRORS ==="
            grep -i "error[: ]" build.log | tail -40 || true
            echo "=== END ERRORS ==="
            exit 1
          fi

      - name: Collect binaries
        shell: bash
        run: |
          mkdir -p server/bin
          find . \( -name "authserver.exe" -o -name "worldserver.exe" \) -print0 2>/dev/null | xargs -0 -I{} cp -v "{}" server/bin/ 2>/dev/null || true
          find . -name "*.dll" -path "*/bin/*" -print0 2>/dev/null | xargs -0 -I{} cp -v "{}" server/bin/ 2>/dev/null || true
          ls -la server/bin/ 2>/dev/null || echo "(no binaries)"

      - name: Collect configs
        shell: bash
        run: |
          mkdir -p server/etc
          find . -name "*.conf.dist" -not -path "./.git/*" -not -path "./modules-src/*" -print0 2>/dev/null | xargs -0 -I{} cp -v "{}" server/etc/ 2>/dev/null || true
          ls server/etc/ 2>/dev/null

      - name: Collect lua_scripts
        shell: bash
        run: |
          [ -d "data/lua_scripts" ] && { mkdir -p server/data && cp -r data/lua_scripts server/data/; }

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-acoremods-windows
          path: |
            server/bin/
            server/etc/
            server/data/
          retention-days: 7
