name: acoremods-build

on:
  push:
    branches: [ 'feature/acoremods' ]
  workflow_dispatch:
    inputs:
      acoremods_branch:
        description: 'acoremods branch to use'
        required: true
        default: 'main'

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    runs-on: windows-latest
    name: windows-acoremods

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/checkout@v4
        with:
          repository: callmefree/acoremods
          ref: ${{ github.event.inputs.acoremods_branch || 'main' }}
          path: modules-src

      - uses: actions/checkout@v4
        with:
          repository: callmefree/mod-ale
          path: mod-ale-src

      # ── 可选模组（注释掉 = 剔除） ──────────────────────
      - uses: actions/checkout@v4
        with:
          repository: callmefree/mod-mythic-plus
          path: mod-mythic-plus-src

      - uses: actions/checkout@v4
        with:
          repository: callmefree/Delves
          path: delves-src

      - uses: actions/checkout@v4
        with:
          repository: callmefree/ClassScrolls
          path: classscrolls-src

      - uses: actions/checkout@v4
        with:
          repository: callmefree/AraxiaCustomAreas
          path: araxia-areas-src
      # ──────────────────────────────────────────────────

      - name: Copy modules
        shell: bash
        run: |
          for mod in modules-src/mod-*; do
            name=$(basename "$mod")
            [ -d "$mod" ] || continue
            cp -r "$mod" "modules/$name"
            echo "Copied: $name"
          done

      - name: Copy module configs
        shell: bash
        run: for conf in modules-src/mod-*/conf/*.conf.dist; do [ -f "$conf" ] && cp -v "$conf" conf/; done

      - name: Copy mod-ale
        shell: bash
        run: |
          cp -r mod-ale-src modules/mod-ale
          echo "Copied: mod-ale"

      - name: Copy new mods
        shell: bash
        run: |
          cp -r mod-mythic-plus-src modules/mod-mythic-plus && echo "Copied: mod-mythic-plus"
          cp -r delves-src modules/delves && echo "Copied: delves"
          cp -r classscrolls-src modules/classscrolls && echo "Copied: classscrolls"
          cp -r araxia-areas-src modules/araxia-areas && echo "Copied: araxia-areas"

      - name: Convert DBC files (CSV → binary .dbc)
        if: success()
        shell: bash
        run: |
          mkdir -p server/data/dbc _dbc_prebuilt
          # Collect pre-built binary DBCs (Morza, etc.)
          find araxia-areas-src -name "*.dbc" -type f 2>/dev/null | while read f; do
            cp -v "$f" _dbc_prebuilt/ || true
          done
          # Process each mod's DBC CSVs in sequence, accumulating with merge
          for src in "delves-src/DBC_CSV/DBFilesClient" \
                     "classscrolls-src/CSV" \
                     "araxia-areas-src/Isle-of-Giants-main/DBFilesClient"; do
            if [ -d "$src" ]; then
              echo "  [DBC] Processing: $src"
              python .github/scripts/csv2dbc.py \
                --batch "$src" server/data/dbc \
                --schema .github/scripts/dbc_schema.json \
                --merge-dir _dbc_prebuilt || echo "  [WARN] DBC conversion issue for $src"
              # Accumulate: merge-dir becomes server/data/dbc for next mod
              rm -rf _dbc_prebuilt && mkdir -p _dbc_prebuilt
              cp server/data/dbc/*.dbc _dbc_prebuilt/ 2>/dev/null || true
            fi
          done
          rm -rf _dbc_prebuilt
          echo "=== DBC Files ==="
          ls -la server/data/dbc/ 2>/dev/null || echo "(no dbc files)"

      - name: Build client MPQ patches
        if: success()
        shell: bash
        run: |
          mkdir -p server/data
          python .github/scripts/build_mpq.py --auto --out-dir server/data/ || echo "  [WARN] MPQ build issue"
          # Collect any pre-built MPQs from AraxiaCustomAreas
          for f in $(find araxia-areas-src -name "*.mpq" -type f 2>/dev/null); do
            cp -v "$f" server/data/ || true
          done
          echo "=== MPQ Patches ==="
          ls -la server/data/*.mpq 2>/dev/null || echo "(no mpq files)"
          ls -la server/data/*.mpq.dir 2>/dev/null || echo "(no mpq fallback dirs)"

      - name: Install dependencies
        shell: bash
        run: |
          choco install --no-progress --skip-checksums -y cmake.install --installargs 'ADD_CMAKE_TO_PATH=System' 2>&1 || true
          choco install --no-progress --skip-checksums -y boost-msvc-14.3 --version=1.87.0 2>&1 || true
          choco install --no-progress --skip-checksums -y openssl 2>&1 || true
          choco install --no-progress --skip-checksums -y mysql --version=8.4.9 2>&1 || true

      - name: Build
        id: build
        shell: bash
        run: |
          export CTOOLS_BUILD=all
          export CONTINUOUS_INTEGRATION=true
          set +e
          ./acore.sh compiler build > build.log 2>&1
          EXIT=$?
          # Extract errors into step summary (visible without login)
          {
            echo "## Build Result (exit=$EXIT)"
            echo '```'
            grep -iE "error|fatal|undefined" build.log | grep -v "0 Error\|0 Warning\|Warn :\|MSB" | head -80
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          # Also emit as annotations
          grep -iE "error C[0-9]|fatal error|undefined reference" build.log | head -40 | while IFS= read -r line; do
            echo "::error ::${line}"
          done
          exit $EXIT

      - name: Collect binaries
        if: success()
        shell: bash
        run: |
          mkdir -p server/bin
          find . \( -name "authserver.exe" -o -name "worldserver.exe" \) 2>/dev/null | while read f; do cp -v "$f" server/bin/ 2>/dev/null || true; done
          find . -name "*.dll" -path "*/bin/*" 2>/dev/null | while read f; do cp -v "$f" server/bin/ 2>/dev/null || true; done
          ls -la server/bin/ 2>/dev/null || echo "(no binaries)"

      - name: Collect configs
        if: success()
        shell: bash
        run: |
          mkdir -p server/etc
          find . -name "*.conf.dist" -not -path "./.git/*" -not -path "./modules-src/*" 2>/dev/null | while read f; do cp -v "$f" server/etc/ 2>/dev/null || true; done

      - name: Collect lua_scripts
        if: success()
        shell: bash
        run: |
          mkdir -p server/bin/lua_scripts
          find . -path "*/lua_scripts/extensions" -type d 2>/dev/null | while read d; do cp -r "$d" server/bin/lua_scripts/ 2>/dev/null || true; done
          find . -name "*.lua" -not -path "./.git/*" 2>/dev/null | while read f; do cp -v "$f" server/bin/lua_scripts/ 2>/dev/null || true; done

      - name: Upload server artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-acoremods-windows
          path: |
            server/bin/
            server/etc/
            server/data/
          retention-days: 7
