name: fork-build
on:
  push:
    branches:
      - 'master'
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  # 手动触发
  workflow_dispatch:
  # 每周日凌晨2点自动编译
  schedule:
    - cron: '0 2 * * 0'

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux 编译验证
  linux-build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
            compiler:
              CC: clang-18
              CXX: clang++-18
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}-modules
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: ./.github/actions/linux-build
        with:
          CC: ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
          modules: true
          pch: false
          maxerrors: 0
          keepgoing: true

  # Windows 编译 + 产出服务端文件
  windows-build:
    runs-on: windows-latest
    name: windows-server
    env:
      BOOST_ROOT: C:\local\boost_1_87_0
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Configure OS
        shell: bash
        env:
          CONTINUOUS_INTEGRATION: true
        run: |
          ./acore.sh install-deps

      - name: Build
        shell: bash
        run: |
          export CTOOLS_BUILD=all
          ./acore.sh compiler build

      - name: Install server files
        shell: bash
        run: |
          mkdir -p server
          cd build
          cmake --install . --prefix "${{ github.workspace }}/server"

      - name: Copy config files
        shell: bash
        run: |
          cp -v env/dist/etc/*.conf.dist server/etc/ 2>/dev/null || true
          cp -v server/etc/authserver.conf.dist server/etc/authserver.conf 2>/dev/null || true
          cp -v server/etc/worldserver.conf.dist server/etc/worldserver.conf 2>/dev/null || true

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-server-windows
          path: |
            server/
          retention-days: 7
